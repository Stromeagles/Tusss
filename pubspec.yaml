name: tus_asistani
description: TUS (Tıpta Uzmanlık Sınavı) Study Application for medical doctors.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Card swiper for Tinder-style flashcards
  flutter_card_swiper: ^7.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Shared preferences for progress tracking
  shared_preferences: ^2.2.3

  # HTTP client for Claude API calls
  http: ^1.2.1

  # Premium typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
